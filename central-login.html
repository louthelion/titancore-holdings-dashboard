<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Dashboard Login</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#070707;
      --green:#18c25c;
      --gold:#d4af37;
      --white:#ffffff;
      --muted:#bdbdbd;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--white);
      min-height:100vh;
    }

    .top-title{
      text-align:center;
      font-size:clamp(2rem,4vw,3rem);
      font-weight:800;
      padding:22px 16px 10px;
      color:var(--white);
    }

    .wrap{
      width:min(1200px,94%);
      margin:0 auto 24px;
      background:var(--panel);
      border:2px solid var(--green);
      display:grid;
      grid-template-columns:1fr 1fr;
      min-height:650px;
    }

    .left{
      padding:32px 26px;
      border-right:2px solid var(--green);
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
    }

    .logo-box{
      width:86px;
      height:86px;
      border:2px solid var(--green);
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:18px;
      color:var(--gold);
      font-size:2rem;
      font-weight:800;
      background:#0b0b0b;
    }

    .login-sub{
      font-size:1.15rem;
      color:var(--gold);
      font-weight:700;
      margin-bottom:24px;
      text-transform:uppercase;
    }

    .field{
      margin-bottom:20px;
    }

    .field label{
      display:block;
      margin-bottom:8px;
      font-weight:700;
      font-size:1rem;
    }

    .field input{
      width:100%;
      padding:17px 15px;
      border:2px solid var(--green);
      border-radius:14px;
      background:#000;
      color:#fff;
      font-size:1rem;
      outline:none;
    }

    .field input::placeholder{
      color:#7d7d7d;
    }

    .field input:focus{
      border-color:var(--gold);
    }

    .login-btn{
      width:100%;
      margin-top:10px;
      padding:18px 15px;
      border:none;
      border-radius:40px;
      background:var(--gold);
      color:#000;
      font-size:1.05rem;
      font-weight:800;
      cursor:pointer;
    }

    .login-btn:hover{
      background:var(--green);
    }

    .helper{
      margin-top:18px;
      font-size:.95rem;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .helper a{
      color:var(--gold);
      text-decoration:none;
    }

    .helper a:hover{
      text-decoration:underline;
    }

    .right{
      padding:32px 26px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .right h2{
      font-size:clamp(2rem,3.4vw,3rem);
      line-height:1.08;
      margin-bottom:18px;
    }

    .right p{
      font-size:1.05rem;
      line-height:1.7;
      max-width:520px;
    }

    .note{
      color:var(--muted);
      font-size:.92rem;
      line-height:1.5;
      margin-top:18px;
    }

    @media (max-width:860px){
      .wrap{
        grid-template-columns:1fr;
      }

      .left{
        border-right:none;
        border-bottom:2px solid var(--green);
      }
    }
  </style>
</head>
<body>
  <div class="top-title">Central Dashboard</div>

  <div class="wrap">
    <div class="left">
      <div class="logo-box">T</div>
      <div class="login-sub">Secure Login</div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@titancoreholdings.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="helper">
          <a href="https://passwordreset.microsoftonline.com/" target="_blank" rel="noopener">Forgot password?</a>
          <span>•</span>
          <a href="mailto:helpdesk@titancoreholdings.com?subject=Need%20help%20with%20dashboard%20email">Forgot email?</a>
        </div>
      </form>
    </div>

    <div class="right">
      <div>
        <h2>Central Dashboard</h2>
        <p>
          Multi-company command center for reporting, oversight, tax review,
          operational review, finance visibility, and executive access across
          the full TitanCore network.
        </p>
      </div>

      <div class="note">
        Sign in to continue to the Central Dashboard.
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if(!email || !password){
        return;
      }

      window.location.href = "index.html";
    });
  </script>
</body>
</html>
