<!--  /titancore/index.html  -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TitanCore Login</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{
      --bg:#000;            /* page background  */
      --edge:#15b74b;       /* green outline    */
      --gold:#d6b34a;       /* gold accent      */
      --fg:#fff;            /* white text       */
      --radius:0.4rem;
      --pad:1.25rem;
      font-family:system-ui,Segoe UI,Roboto,sans-serif;
    }
    *{box-sizing:border-box;margin:0}
    body{background:var(--bg);color:var(--fg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:1.5rem}
    h1{font-size:clamp(1.8rem,6vw,3.4rem);text-align:center;color:var(--edge);margin-bottom:1.5rem;font-weight:800;line-height:1.1}
    /* ─── Login panel ─────────────────── */
    .panel{
      width:100%;max-width:30rem;border:2px solid var(--edge);padding:var(--pad);display:flex;flex-direction:column;gap:1rem;border-radius:var(--radius)
    }
    .logo{
      width:5rem;height:5rem;border:2px solid var(--edge);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:700;color:var(--gold);margin:auto auto 1rem
    }
    label{font-weight:600;margin-bottom:0.25rem;display:block}
    input[type=email],input[type=password]{
      width:100%;padding:0.75rem 1rem;border:2px solid var(--edge);border-radius:var(--radius);background:none;color:var(--fg);font-size:1rem
    }
    input::placeholder{color:#666}
    button{
      width:100%;padding:0.9rem 1rem;margin-top:0.5rem;background:var(--gold);color:#000;border:none;border-radius:999px;font-size:1.05rem;font-weight:700;cursor:pointer;transition:opacity .25s
    }
    button:hover{opacity:.85}
    .links{font-size:0.9rem;text-align:center;margin-top:0.5rem}
    .links a{color:var(--gold);text-decoration:none;padding:0 .25rem}
    .links a:hover{text-decoration:underline}
    /* ─── footer ───────────────────────── */
    footer{margin-top:2.5rem;font-size:0.8rem;opacity:.6}
    /* ─── small screens ────────────────── */
    @media(max-width:430px){body{padding:1rem}}
  </style>
</head>
<body>

  <h1>TitanCore<br>Dashboard Login</h1>

  <form class="panel" onsubmit="return go()">
      <div class="logo">T</div>

      <div>
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="name@titancoreholdings.com" required>
      </div>

      <div>
        <label for="pw">Password</label>
        <input id="pw" type="password" placeholder="Password" required>
      </div>

      <button type="submit">Login</button>

      <div class="links">
        <a href="#">Forgot password?</a> •
        <a href="#">Forgot email?</a>
      </div>
  </form>

  <footer>© TitanCore Holdings – internal use only</footer>

<script>
/* Very simple front-end redirect.
   Replace with real auth logic when ready.               */
function go(){
  const okEmail = document.getElementById('email').value.trim();
  const okPw    = document.getElementById('pw').value.trim();

  if(okEmail && okPw){
      // 🡲 where the logged-in dashboard lives
      window.location.href = 'titancore-dashboard.html';
  }
  return false;  // prevent form post
}
</script>
</body>
</html>
